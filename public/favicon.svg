<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradiente basado en tus clases de Tailwind (orange-500 a red-600) -->
    <linearGradient id="ucGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo oscuro con bordes redondeados (bg-[#0c1324]) -->
  <rect width="512" height="512" rx="110" fill="#0c1324" />
  
  <!-- Perforaciones estilo cinta de película -->
  <circle cx="64" cy="128" r="20" fill="#191f31" />
  <circle cx="64" cy="256" r="20" fill="#191f31" />
  <circle cx="64" cy="384" r="20" fill="#191f31" />
  
  <circle cx="448" cy="128" r="20" fill="#191f31" />
  <circle cx="448" cy="256" r="20" fill="#191f31" />
  <circle cx="448" cy="384" r="20" fill="#191f31" />
  
  <!-- Monograma UC -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="220" font-style="italic" fill="url(#ucGrad)">UC</text>
</svg>
